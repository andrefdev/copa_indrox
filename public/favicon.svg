<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9000FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4F008C;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="#0E0816"/>

  <!-- Trophy shape -->
  <g>
    <!-- Cup -->
    <ellipse cx="100" cy="70" rx="35" ry="40" fill="url(#purpleGradient)" stroke="#FFD700" stroke-width="2"/>

    <!-- Cup handles -->
    <path d="M 130 60 Q 150 50 150 80" fill="none" stroke="url(#purpleGradient)" stroke-width="3" stroke-linecap="round"/>
    <path d="M 70 60 Q 50 50 50 80" fill="none" stroke="url(#purpleGradient)" stroke-width="3" stroke-linecap="round"/>

    <!-- Stem -->
    <rect x="90" y="110" width="20" height="30" fill="url(#purpleGradient)" stroke="#FFD700" stroke-width="2"/>

    <!-- Base -->
    <ellipse cx="100" cy="145" rx="45" ry="15" fill="url(#purpleGradient)" stroke="#FFD700" stroke-width="2"/>
    <ellipse cx="100" cy="143" rx="40" ry="12" fill="#9000FF" opacity="0.8"/>

    <!-- Star accents inside cup -->
    <circle cx="85" cy="70" r="3" fill="#FFD700" opacity="0.8"/>
    <circle cx="115" cy="75" r="3" fill="#FFD700" opacity="0.8"/>
    <circle cx="100" cy="90" r="2" fill="#FFD700" opacity="0.6"/>
  </g>

  <!-- Glow effect -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#9000FF" stroke-width="1" opacity="0.3"/>
</svg>
